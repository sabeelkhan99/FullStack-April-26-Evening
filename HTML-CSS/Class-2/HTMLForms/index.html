<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>HTML Forms</h1>

    <input type="text" placeholder="Enter your username">
    <input type="password" placeholder="enter password">
    <input type="email" placeholder="email">

    <input type="color">
    <input type="date">
    <input type="time">
    <input type="file">
    <input type="radio">
    <input type="checkbox" checked>
    <input type="range" min="1" max="5" step="1">

    <h2>GET</h2>
    <form action="http://myapp.com/somerandom" method="get">
        <input type="text" placeholder="brand" name="brand">
        <input type="text" placeholder="color" name="color">
        <button type="submit">Submit</button>
    </form>

    <h2>POST</h2>
    <form action="http://myapp.com/somerandom" method="post">
        <input type="text" placeholder="brand" name="brand">
        <input type="text" placeholder="color" name="color">
        <button type="submit">Submit</button>
    </form>

    <!-- https://www.google.com/search?q=iphones -->

    <h2>Google Hijack</h2>

    <form action="https://www.google.com/search" method="get">
        <input type="text" placeholder="Google search" name="q">
        <button>Search</button>
    </form>

     <h2>YT Search Hijack</h2>

    <!-- https://www.youtube.com/results?search_query=scaler -->
     <form action="https://www.youtube.com/results" method="get">
        <label for="search">Youtube Search</label>
        <input type="text" placeholder="search youtube" name="search_query" id="search">
        <button>Search</button>
     </form>

</body>
</html>
